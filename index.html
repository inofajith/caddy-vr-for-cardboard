<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caddy MR Passthrough</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #gui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #111; color: #00ff00; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; font-family: monospace;
        }
        button { 
            padding: 20px 40px; font-size: 22px; cursor: pointer; 
            background: #00ff00; border: none; border-radius: 10px; 
            font-weight: bold; color: black; margin-top: 20px;
        }
        .status-msg { font-size: 14px; color: #888; margin-bottom: 10px; }
    </style>
</head>

<body>
    <div id="gui">
        <h1 style="margin:0">CADDY MR</h1>
        <p class="status-msg" id="status">Initializing Camera...</p>
        <button id="start-btn" style="display:none">START PASSTHROUGH</button>
    </div>
    
    <video id="input_video" style="display:none" playsinline></video>

    <a-scene xr-mode-ui="enabled: true">
        <a-assets>
            <canvas id="feed-canvas"></canvas>
        </a-assets>

        <a-sky id="mr-background" material="src: #feed-canvas; shader: flat" rotation="0 -90 0"></a-sky>

        <a-entity id="rig">
            <a-camera id="main-cam" position="0 1.6 0" look-controls></a-camera>
        </a-entity>

        <a-sphere id="hand-cursor" radius="0.03" color="yellow" material="emissive: yellow; emissiveIntensity: 2"></a-sphere>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const feedCanvas = document.getElementById('feed-canvas');
        const feedCtx = feedCanvas.getContext('2d');
        const handCursor = document.getElementById('hand-cursor');
        const startBtn = document.getElementById('start-btn');
        const statusMsg = document.getElementById('status');
        const scene = document.querySelector('a-scene');

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, 
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            // Update the MR Passthrough Canvas
            if (results.image) {
                feedCanvas.width = results.image.width;
                feedCanvas.height = results.image.height;
                feedCtx.drawImage(results.image, 0, 0, feedCanvas.width, feedCanvas.height);
                
                // Force A-Frame to refresh the sky texture
                const sky = document.getElementById('mr-background');
                if (sky.components.material && sky.components.material.material.map) {
                    sky.components.material.material.map.needsUpdate = true;
                }
            }

            // Handle Hand Tracking Logic
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                const thumbTip = hand[4];

                // Coordinate Mapping for Environment (Back) Camera
                // X: (0-1) to (-2.5 to 2.5), Y: (0-1) to (0.5 to 3.0)
                const x = (indexTip.x - 0.5) * 5; 
                const y = (0.5 - indexTip.y) * 4 + 1.6; 
                const z = -1.5; 

                handCursor.setAttribute('position', `${x} ${y} ${z}`);

                // Pinch to Draw (Mixed Reality Interaction)
                const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                if (pinchDist < 0.05) {
                    handCursor.setAttribute('color', 'red');
                    
                    // Create a 3D dot in the air
                    const dot = document.createElement('a-sphere');
                    dot.setAttribute('radius', '0.015');
                    dot.setAttribute('color', 'red');
                    dot.setAttribute('position', `${x} ${y} ${z}`);
                    scene.appendChild(dot);
                } else {
                    handCursor.setAttribute('color', 'yellow');
                }
            }
        });

        // Use the Back Camera (Environment)
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480, facingMode: 'environment'
        });

        window.onload = () => {
            if (location.protocol !== 'https:') {
                statusMsg.innerHTML = "<b style='color:red'>HTTPS REQUIRED!</b><br>Enable 'Enforce HTTPS' in GitHub Settings.";
            } else {
                statusMsg.innerText = "System Ready.";
                startBtn.style.display = "block";
            }
        };

        startBtn.onclick = () => {
            document.getElementById('gui').style.display = 'none';
            camera.start().catch(err => {
                alert("Camera error: " + err.message);
                document.getElementById('gui').style.display = 'flex';
            });
            // Trigger Stereoscopic View
            scene.enterVR();
        };
    </script>
</body>
</html>
