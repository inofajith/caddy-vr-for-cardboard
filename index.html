<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caddy VR | True Mixed Reality</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #00ff00; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; z-index: 1000; font-family: monospace;
        }
        button { 
            padding: 20px 40px; font-size: 20px; cursor: pointer; 
            background: #00ff00; border: none; border-radius: 10px; font-weight: bold;
        }
        #video-canvas { display: none; }
    </style>
</head>

<body>
    <div id="overlay">
        <h1>CADDY MR SYSTEM</h1>
        <p id="status">INITIALIZING PASSTHROUGH...</p>
        <button id="start-btn" style="display:none">ENGAGE MR</button>
    </div>
    
    <video id="input_video" style="display:none" playsinline></video>
    <canvas id="video-canvas"></canvas>

    <a-scene xr-mode-ui="enabled: true" renderer="antialias: true; colorManagement: true;">
        <a-assets>
            <canvas id="tex-canvas"></canvas>
        </a-assets>

        <a-sphere id="mr-sphere" 
                  radius="100" 
                  material="src: #tex-canvas; shader: flat; side: back" 
                  rotation="0 -90 0">
        </a-sphere>

        <a-entity id="rig">
            <a-camera position="0 1.6 0" look-controls></a-camera>
        </a-entity>

        <a-sphere id="hand-cursor" radius="0.04" color="yellow" material="emissive: yellow; emissiveIntensity: 2"></a-sphere>

        <a-box position="0 1.5 -1.5" width="0.2" height="0.2" depth="0.2" color="#444"></a-box>

        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const texCanvas = document.getElementById('tex-canvas');
        const texCtx = texCanvas.getContext('2d');
        const handCursor = document.getElementById('hand-cursor');
        const startBtn = document.getElementById('start-btn');
        const scene = document.querySelector('a-scene');

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            // Update the MR Texture
            if (results.image) {
                if (texCanvas.width !== results.image.width) {
                    texCanvas.width = results.image.width;
                    texCanvas.height = results.image.height;
                }
                texCtx.drawImage(results.image, 0, 0, texCanvas.width, texCanvas.height);
                
                // CRITICAL: Manually update the A-Frame texture map
                const mrSphere = document.getElementById('mr-sphere');
                if (mrSphere.components.material.material.map) {
                    mrSphere.components.material.material.map.needsUpdate = true;
                }
            }

            // Tracking and Drawing
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const x = (hand[8].x - 0.5) * 5; 
                const y = (0.5 - hand[8].y) * 4 + 1.6; 
                const z = -1.5; 

                handCursor.setAttribute('position', `${x} ${y} ${z}`);

                const pinch = Math.hypot(hand[8].x - hand[4].x, hand[8].y - hand[4].y);
                if (pinch < 0.05) {
                    const dot = document.createElement('a-sphere');
                    dot.setAttribute('radius', '0.02');
                    dot.setAttribute('color', 'red');
                    dot.setAttribute('position', `${x} ${y} ${z}`);
                    scene.appendChild(dot);
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480, facingMode: 'environment'
        });

        window.onload = () => {
            if (location.protocol !== 'https:') {
                document.getElementById('status').innerText = "HTTPS REQUIRED";
            } else {
                document.getElementById('status').innerText = "SYSTEM READY";
                startBtn.style.display = "block";
            }
        };

        startBtn.onclick = () => {
            document.getElementById('overlay').style.display = 'none';
            camera.start();
            // Enter VR / Cardboard mode
            scene.enterVR();
        };
    </script>
</body>
</html>
