<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Caddy VR | Pro Physics Hands</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #00ff00; 
              display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-family: monospace; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #00ff00; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>

<body>
    <div id="ui">
        <h1>PRO CADDY VR</h1>
        <p>Full Hand Physics + Gravity</p>
        <button id="start-btn">INITIALIZE SYSTEM</button>
    </div>
    
    <video id="input_video" style="display:none" playsinline></video>

    <a-scene physics="debug: false; gravity: -9.8">
        <a-sky color="#0a0a0a"></a-sky>

        <a-box id="table" position="0 0.8 -1.2" width="2" height="0.1" depth="1" color="#333" static-body></a-box>
        <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#111" static-body></a-plane>

        <a-box class="grabable" position="-0.3 1.2 -1.2" width="0.2" height="0.2" depth="0.2" color="#f00" dynamic-body="mass: 1"></a-box>
        <a-sphere class="grabable" position="0 1.2 -1.2" radius="0.15" color="#0f0" dynamic-body="mass: 1"></a-sphere>
        <a-cylinder class="grabable" position="0.3 1.2 -1.2" radius="0.1" height="0.3" color="#00f" dynamic-body="mass: 1"></a-cylinder>

        <a-entity id="rig">
            <a-camera position="0 1.6 0"></a-camera>
        </a-entity>

        <a-entity id="full-hand"></a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" position="1 3 1" intensity="0.8"></a-light>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const handContainer = document.getElementById('full-hand');
        const startBtn = document.getElementById('start-btn');
        const scene = document.querySelector('a-scene');
        
        let joints = [];
        let grabbedElement = null;

        // Initialize 21 spheres for hand joints
        for (let i = 0; i < 21; i++) {
            let sphere = document.createElement('a-sphere');
            sphere.setAttribute('radius', '0.015');
            sphere.setAttribute('color', '#00ff00');
            // Add physics to joints to interact with objects
            sphere.setAttribute('static-body', 'shape: sphere; sphereRadius: 0.02');
            handContainer.appendChild(sphere);
            joints.push(sphere);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Update joint positions
                hand.forEach((lm, i) => {
                    const x = (lm.x - 0.5) * -3; // Front camera mapping
                    const y = (0.5 - lm.y) * 2.5 + 1.5;
                    const z = -1.2 + (lm.z * 0.5);
                    
                    joints[i].setAttribute('position', `${x} ${y} ${z}`);
                });

                // Realistic Grab Logic
                // If Thumb (4) and Index (8) and Middle (12) are close = GRAB
                const thumb = hand[4];
                const index = hand[8];
                const middle = hand[12];

                const pinchDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                const palmX = (hand[9].x - 0.5) * -3; 
                const palmY = (0.5 - hand[9].y) * 2.5 + 1.5;

                if (pinchDist < 0.06) {
                    if (!grabbedElement) {
                        checkGrab(palmX, palmY, -1.2);
                    }
                } else {
                    releaseGrab();
                }

                if (grabbedElement) {
                    // Update grabbed object position to follow palm
                    grabbedElement.setAttribute('position', `${palmX} ${palmY} -1.2`);
                    // Sleep physics while held so it doesn't jitter
                    if (grabbedElement.body) {
                        grabbedElement.body.velocity.set(0,0,0);
                        grabbedElement.body.angularVelocity.set(0,0,0);
                    }
                }
            }
        });

        function checkGrab(x, y, z) {
            const items = document.querySelectorAll('.grabable');
            items.forEach(item => {
                const itemPos = item.getAttribute('position');
                const dist = Math.hypot(x - itemPos.x, y - itemPos.y);
                if (dist < 0.3) {
                    grabbedElement = item;
                    item.setAttribute('color', 'yellow'); // Feedback
                }
            });
        }

        function releaseGrab() {
            if (grabbedElement) {
                grabbedElement.setAttribute('color', grabbedElement.dataset.origColor || grabbedElement.getAttribute('color'));
                grabbedElement = null;
            }
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        startBtn.onclick = () => {
            document.getElementById('ui').style.display = 'none';
            camera.start();
            // Enter VR for cardboard
            scene.enterVR();
        };
    </script>
</body>
</html>
