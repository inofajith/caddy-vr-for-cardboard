<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caddy VR | Hand Tracking Stable</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            color: #00ff00; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        #msg { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; margin-bottom: 20px; }
        button { 
            padding: 18px 45px; font-size: 20px; cursor: pointer; 
            background: #00ff00; border: none; border-radius: 5px; 
            font-weight: bold; color: black; transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }
        button:hover { transform: scale(1.05); background: #fff; }
        #debug-console { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); 
            color: #ff4444; font-size: 10px; padding: 5px; pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="ui-overlay">
        <h1 style="font-weight: 200; margin-bottom: 5px;">CADDY VR</h1>
        <p id="msg">Awaiting System Authorization...</p>
        <button id="start-btn">INITIALIZE VR</button>
    </div>
    
    <div id="debug-console"></div>
    <video id="input_video" style="display:none" playsinline></video>

    <a-scene renderer="colorManagement: true; antialias: true;">
        <a-sky color="#050505"></a-sky>

        <a-box id="table" position="0 0.7 -0.8" width="1.4" height="0.05" depth="0.8" color="#1a1a1a"></a-box>
        
        <a-entity id="workshop-items">
            <a-box class="grabable" position="-0.3 0.85 -0.8" width="0.12" height="0.12" depth="0.12" color="#ff4a4a"></a-box>
            <a-sphere class="grabable" position="0 0.85 -0.8" radius="0.08" color="#4aff4a"></a-sphere>
            <a-cylinder class="grabable" position="0.3 0.85 -0.8" radius="0.06" height="0.15" color="#4a4aff"></a-cylinder>
        </a-entity>

        <a-entity id="hand-skeleton"></a-entity>
        
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="point" position="1 2 -0.5" intensity="0.8"></a-light>
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-camera>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const msg = document.getElementById('msg');
        const debug = document.getElementById('debug-console');
        const skeleton = document.getElementById('hand-skeleton');
        
        let joints = [];
        let grabbedObj = null;

        // Build the Ghost Hand Model
        for (let i = 0; i < 21; i++) {
            let joint = document.createElement('a-sphere');
            joint.setAttribute('radius', '0.015');
            joint.setAttribute('color', '#cccccc');
            joint.setAttribute('opacity', '0.5');
            joint.setAttribute('material', 'flat');
            skeleton.appendChild(joint);
            joints.push(joint);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            // Remove UI once first hand is detected
            if (document.getElementById('ui-overlay').style.display !== 'none') {
                document.getElementById('ui-overlay').style.display = 'none';
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Track Joint Positions
                hand.forEach((lm, i) => {
                    const x = (lm.x - 0.5) * -3; 
                    const y = (0.5 - lm.y) * 2 + 1.1; 
                    const z = -0.8 + (lm.z * 0.3);
                    joints[i].setAttribute('position', `${x} ${y} ${z}`);
                });

                const thumb = hand[4];
                const index = hand[8];
                const palmX = (hand[9].x - 0.5) * -3;
                const palmY = (0.5 - hand[9].y) * 2 + 1.1;
                const palmZ = -0.8;

                // Simple Pinch-to-Grab logic
                const pinch = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                if (pinch < 0.06) {
                    if (!grabbedObj) {
                        const items = document.querySelectorAll('.grabable');
                        items.forEach(obj => {
                            const pos = obj.getAttribute('position');
                            const d = Math.hypot(palmX - pos.x, palmY - pos.y);
                            if (d < 0.2) grabbedObj = obj;
                        });
                    }
                } else {
                    grabbedObj = null;
                }

                if (grabbedObj) {
                    grabbedObj.setAttribute('position', `${palmX} ${palmY} ${palmZ}`);
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { try { await hands.send({image: videoElement}); } catch(e) {} },
            width: 640, height: 480
        });

        startBtn.onclick = () => {
            msg.innerText = "Requesting Hardware Access...";
            camera.start()
                .then(() => {
                    document.querySelector('a-scene').enterVR();
                })
                .catch(err => {
                    debug.innerText = "Error: " + err.message;
                    msg.innerText = "Camera Blocked or Not Found";
                });
        };

        // Fallback for script loading errors
        window.onerror = (e) => { debug.innerText = "System Error: " + e; };
    </script>
</body>
</html>
