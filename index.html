<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caddy VR | Pro Edition</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #launcher { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #00ff00; display: flex; 
            flex-direction: column; justify-content: center; 
            align-items: center; z-index: 9999; text-align: center;
        }
        .btn { 
            padding: 20px 50px; font-size: 22px; cursor: pointer; 
            background: #00ff00; border: none; border-radius: 5px; 
            font-weight: bold; color: black; margin-top: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        #status { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>

<body>
    <div id="launcher">
        <h1 style="letter-spacing: 10px;">CADDY</h1>
        <button id="start-btn" class="btn">START SYSTEM</button>
        <p id="status">Awaiting User Interaction...</p>
    </div>
    
    <video id="input_video" style="display:none" playsinline muted></video>

    <a-scene renderer="antialias: true; colorManagement: true;">
        <a-sky color="#050505"></a-sky>

        <a-box position="0 0.7 -0.8" width="1.5" height="0.05" depth="0.8" color="#111"></a-box>
        
        <a-entity id="shapes">
            <a-box class="grab" position="-0.3 0.85 -0.8" width="0.12" height="0.12" depth="0.12" color="#ff4444"></a-box>
            <a-sphere class="grab" position="0 0.85 -0.8" radius="0.08" color="#44ff44"></a-sphere>
            <a-cylinder class="grab" position="0.3 0.85 -0.8" radius="0.06" height="0.15" color="#4444ff"></a-cylinder>
        </a-entity>

        <a-entity id="hand-mesh"></a-entity>
        
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="point" position="0 2 0" intensity="0.8"></a-light>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const video = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const status = document.getElementById('status');
        const skeleton = document.getElementById('hand-mesh');
        
        let joints = [];
        let grabbedObj = null;

        // Smooth movement variables
        const lerp = (a, b, t) => a + (b - a) * t;
        let smoothHand = Array(21).fill().map(() => ({x: 0, y: 1.6, z: -1}));

        // Build Hand Visuals
        for (let i = 0; i < 21; i++) {
            let j = document.createElement('a-sphere');
            j.setAttribute('radius', '0.015');
            j.setAttribute('color', '#888');
            j.setAttribute('opacity', '0.5');
            skeleton.appendChild(j);
            joints.push(j);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('launcher').style.display = 'none';
                const hand = results.multiHandLandmarks[0];
                
                hand.forEach((lm, i) => {
                    const tx = (lm.x - 0.5) * -3.5;
                    const ty = (0.5 - lm.y) * 2.5 + 1.1;
                    const tz = -0.8 + (lm.z * 0.4);

                    // Apply Smoothing
                    smoothHand[i].x = lerp(smoothHand[i].x, tx, 0.4);
                    smoothHand[i].y = lerp(smoothHand[i].y, ty, 0.4);
                    smoothHand[i].z = lerp(smoothHand[i].z, tz, 0.4);

                    joints[i].setAttribute('position', `${smoothHand[i].x} ${smoothHand[i].y} ${smoothHand[i].z}`);
                });

                // Grab Logic
                const thumb = smoothHand[4];
                const index = smoothHand[8];
                const palm = smoothHand[9];
                if (Math.hypot(index.x - thumb.x, index.y - thumb.y) < 0.08) {
                    if (!grabbedObj) {
                        document.querySelectorAll('.grab').forEach(obj => {
                            const p = obj.getAttribute('position');
                            if (Math.hypot(palm.x - p.x, palm.y - p.y) < 0.2) grabbedObj = obj;
                        });
                    }
                } else { grabbedObj = null; }

                if (grabbedObj) grabbedObj.setAttribute('position', `${palm.x} ${palm.y} ${palm.z}`);
            }
        });

        async function init() {
            status.innerText = "Requesting Camera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                await video.play();
                
                const camera = new Camera(video, {
                    onFrame: async () => { await hands.send({image: video}); },
                    width: 640, height: 480
                });
                camera.start();
                document.querySelector('a-scene').enterVR();
            } catch (err) {
                status.innerText = "Error: " + err.message;
            }
        }

        startBtn.onclick = init;
    </script>
</body>
</html>
