<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CADDY MR | Native Smooth</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
    <a-scene 
      webxr="optionalFeatures: hand-tracking, immersive-ar;" 
      renderer="alpha: true; antialias: true; colorManagement: true;">
      
      <a-entity id="leftHand" hand-tracking-controls="hand: left; modelStyle: mesh;"></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right; modelStyle: mesh;"></a-entity>

      <a-entity id="engine" position="0 1.2 -0.5">
          <a-box width="0.15" height="0.15" depth="0.15" color="#555" metalness="0.7"></a-box>
      </a-entity>

      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="point" position="1 2 1"></a-light>

      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
      // Native "Pinch" detection for WebXR Hands
      const engine = document.getElementById('engine');
      
      // We listen for the 'pinchstarted' event which is built into the browser
      window.addEventListener('pinchstarted', (evt) => {
        const handPos = evt.detail.position;
        engine.setAttribute('position', handPos);
      });
    </script>
</body>
</html>
