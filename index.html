<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CADDY VR | Desktop Workstation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #00ff00; 
              display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-family: 'Courier New', monospace; }
        button { padding: 20px 50px; font-size: 22px; cursor: pointer; background: #00ff00; border: none; border-radius: 50px; font-weight: bold; color: black; box-shadow: 0 0 15px #00ff00; }
        .info { margin-top: 20px; color: #666; text-align: center; font-size: 14px; }
    </style>
</head>

<body>
    <div id="ui">
        <h1 style="letter-spacing: 5px;">CADDY VR</h1>
        <p>ADVANCED CAD VISUALIZATION</p>
        <button id="start-btn">BOOT SYSTEM</button>
        <div class="info">Place phone in headset.<br>Use your hands to interact with the engine on the table.</div>
    </div>
    
    <video id="input_video" style="display:none" playsinline></video>

    <a-scene shadow="type: pcfsoft">
        <a-sky color="#080808"></a-sky>

        <a-box id="table" position="0 0.7 -1" width="1.5" height="0.05" depth="1" color="#1a1a1a" shadow></a-box>
        <a-box id="table-leg-l" position="-0.6 0.35 -1" width="0.05" height="0.7" depth="0.05" color="#111"></a-box>
        <a-box id="table-leg-r" position="0.6 0.35 -1" width="0.05" height="0.7" depth="0.05" color="#111"></a-box>

        <a-entity id="engine-assembly" position="0 1.1 -1">
            <a-box id="engine-block" width="0.3" height="0.3" depth="0.4" color="#333" metalness="0.5" shadow></a-box>
            
            <a-cylinder id="piston-l" position="-0.2 0 0" rotation="0 0 90" radius="0.08" height="0.1" color="#00ffff"></a-cylinder>
            <a-cylinder id="piston-r" position="0.2 0 0" rotation="0 0 90" radius="0.08" height="0.1" color="#00ffff"></a-cylinder>
            <a-box id="top-cover" position="0 0.2 0" width="0.25" height="0.05" depth="0.35" color="#ff0055"></a-box>
            <a-sphere id="front-gear" position="0 0 0.25" radius="0.1" color="#ffcc00"></a-sphere>
        </a-entity>

        <a-entity id="hand-rig"></a-entity>
        
        <a-entity id="annotation-layer"></a-entity>

        <a-light type="ambient" intensity="0.4"></a-light>
        <a-light type="spot" position="0 3 -1" target="#table" intensity="1" angle="30" shadow></a-light>
        <a-light type="point" position="-1 2 0" intensity="0.5" color="#00ff00"></a-light>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const videoElement = document.getElementById('input_video');
        const handRig = document.getElementById('hand-rig');
        const startBtn = document.getElementById('start-btn');
        const inkContainer = document.getElementById('annotation-layer');
        
        let joints = [];
        let isExploded = false;

        // Create the 21-point hand skeleton
        for (let i = 0; i < 21; i++) {
            let joint = document.createElement('a-sphere');
            joint.setAttribute('radius', '0.012');
            joint.setAttribute('color', '#00ff00');
            joint.setAttribute('material', 'emissive: #00ff00; emissiveIntensity: 0.5');
            handRig.appendChild(joint);
            joints.push(joint);
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Track Hand Joints
                hand.forEach((lm, i) => {
                    const x = (lm.x - 0.5) * -3.5; // Mirrored for standard phone use
                    const y = (0.5 - lm.y) * 2.5 + 1.5;
                    const z = -1.0 + (lm.z * 0.5);
                    joints[i].setAttribute('position', `${x} ${y} ${z}`);
                });

                const thumb = hand[4];
                const index = hand[8];
                const pinky = hand[20];

                // --- GESTURE: PINCH (ANNOTATION) ---
                const pinchDist = Math.hypot(index.x - thumb.x, index.y - thumb.y);
                if (pinchDist < 0.05) {
                    const ax = (index.x - 0.5) * -3.5;
                    const ay = (0.5 - index.y) * 2.5 + 1.5;
                    createInk(ax, ay, -1.0);
                }

                // --- GESTURE: FIST (EXPLODE ENGINE) ---
                const fistDist = Math.hypot(index.x - pinky.x, index.y - pinky.y);
                if (fistDist < 0.12 && !isExploded) {
                    toggleExplosion(true);
                    isExploded = true;
                } else if (fistDist > 0.3 && isExploded) {
                    toggleExplosion(false);
                    isExploded = false;
                }
            }
        });

        function createInk(x, y, z) {
            const ink = document.createElement('a-sphere');
            ink.setAttribute('radius', '0.007');
            ink.setAttribute('color', '#ff0000');
            ink.setAttribute('position', `${x} ${y} ${z}`);
            inkContainer.appendChild(ink);
        }

        function toggleExplosion(state) {
            const pistonL = document.getElementById('piston-l');
            const pistonR = document.getElementById('piston-r');
            const topCover = document.getElementById('top-cover');
            const gear = document.getElementById('front-gear');

            const config = state ? {
                pL: "-0.6 0.2 0.2", pR: "0.6 0.2 0.2", tC: "0 0.6 0", g: "0 0 0.6"
            } : {
                pL: "-0.2 0 0", pR: "0.2 0 0", tC: "0 0.2 0", g: "0 0 0.25"
            };

            const anim = (el, pos) => {
                el.setAttribute('animation', `property: position; to: ${pos}; dur: 800; easing: easeOutExpo`);
            };

            anim(pistonL, config.pL);
            anim(pistonR, config.pR);
            anim(topCover, config.tC);
            anim(gear, config.g);
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        startBtn.onclick = () => {
            document.getElementById('ui').style.display = 'none';
            camera.start();
            document.querySelector('a-scene').enterVR();
        };
    </script>
</body>
</html>
